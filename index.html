<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bon de sortie</title>
<style>
  :root{
    --bg:#0c0e13; --surface:#161922; --surface2:#1e222d; --line:#2a2f3b;
    --txt:#e8eaf0; --muted:#8b92a0; --accent:#22c55e; --accent2:#3b82f6;
    --danger:#f87171; --warn:#fbbf24; --radius:12px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ -webkit-text-size-adjust:100%; }
  html,body{ max-width:100%; overflow-x:hidden; }
  body{ margin:0 auto; font-family:-apple-system,"Segoe UI",Roboto,Inter,Arial,sans-serif;
        background:var(--bg); color:var(--txt); max-width:540px;
        padding:calc(18px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
                calc(40px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left)); }
  h1{ font-size:15px; font-weight:600; letter-spacing:3px; text-align:center;
      color:var(--muted); text-transform:uppercase; margin:4px 0 22px; }
  label{ display:block; font-size:12.5px; letter-spacing:.4px; color:var(--muted);
         margin:16px 0 6px; text-transform:uppercase; font-weight:600; }
  label .req{ color:var(--accent); }
  input[type=text],input[type=number]{
    width:100%; padding:13px 14px; font-size:16px; color:var(--txt);
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    outline:none; transition:border-color .15s, box-shadow .15s; }
  input:focus{ border-color:var(--accent2); box-shadow:0 0 0 3px rgba(59,130,246,.18); }
  input::placeholder{ color:#565d6b; }
  .row{ display:flex; gap:10px; }
  .row input{ flex:1; }
  button{ font-size:15px; font-weight:600; border:none; border-radius:var(--radius);
          padding:13px 16px; cursor:pointer; transition:filter .15s, opacity .15s; }
  button:active{ filter:brightness(1.15); }
  .btn-scan{ background:var(--surface2); color:var(--txt); border:1px solid var(--line);
             white-space:nowrap; }
  .btn-clear{ background:transparent; color:var(--muted); border:1px solid var(--line);
              padding:7px 12px; font-size:13px; }
  .btn-add{ background:var(--accent); color:#04210f; width:100%; font-size:16px;
            font-weight:700; padding:16px; margin-top:20px; letter-spacing:.5px; }
  .btn-add:disabled{ background:#39414c; color:#7d8493; }
  #reader{ width:100%; margin-top:10px; border-radius:var(--radius); overflow:hidden; display:none; }
  #date{ color:var(--muted); font-size:14px; padding:4px 2px; }
  #rawScan{ display:none; margin-top:8px; padding:9px 11px; border-radius:8px;
            background:var(--surface2); border:1px solid var(--line);
            font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px;
            color:var(--warn); word-break:break-all; }
  canvas#sign{ width:100%; height:150px; border:1px solid var(--line);
               border-radius:var(--radius); touch-action:none; background:var(--surface); }
  .sign-row{ display:flex; justify-content:flex-end; margin-top:8px; }
  #msg{ margin-top:14px; padding:12px 14px; border-radius:var(--radius); font-size:14px; display:none; }
  #msg.ok{ background:rgba(34,197,94,.12); color:#7ee2a4; border:1px solid rgba(34,197,94,.3); display:block; }
  #msg.err{ background:rgba(248,113,113,.12); color:#fca5a5; border:1px solid rgba(248,113,113,.3); display:block; }

  #histo{ margin-top:24px; display:none; }
  .htitle{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .htitle .lbl{ font-size:12.5px; letter-spacing:.6px; text-transform:uppercase;
                color:var(--muted); font-weight:600; }
  .btn-send{ background:var(--accent2); color:#fff; padding:10px 14px; font-size:13.5px; }
  .btn-send:disabled{ background:#39414c; color:#7d8493; }
  .hrow{ display:flex; align-items:center; gap:12px; padding:13px 14px;
         background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
         margin-bottom:8px; }
  .hrow .bf{ font-weight:700; font-size:15px; letter-spacing:.3px; }
  .hrow .meta{ flex:1; min-width:0; font-size:12.5px; color:var(--muted);
               overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .qty{ background:var(--surface2); border:1px solid var(--line); color:var(--accent);
        font-weight:700; font-size:13px; padding:4px 10px; border-radius:999px; white-space:nowrap; }
  .grouped{ color:var(--warn); font-size:11px; margin-left:6px; }
  .hdel{ background:transparent; color:var(--danger); border:1px solid transparent;
         padding:6px 8px; font-size:15px; line-height:1; }
  .hdel:active{ background:rgba(248,113,113,.12); }

  /* ---- Modale de vérification des quantités ---- */
  #overlay{ position:fixed; inset:0; background:rgba(4,6,10,.78); backdrop-filter:blur(3px);
            display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
  #modal{ width:100%; max-width:480px; background:var(--surface); border:1px solid var(--line);
          border-radius:16px; padding:18px; display:flex; flex-direction:column;
          max-height:88vh; max-height:88dvh;
          margin-bottom:env(safe-area-inset-bottom);
          box-shadow:0 24px 70px rgba(0,0,0,.55); }
  .m-head{ display:flex; justify-content:space-between; align-items:center; }
  .m-head .t{ font-size:16px; font-weight:700; }
  .m-x{ background:transparent; color:var(--muted); padding:4px 8px; font-size:16px; }
  .m-sub{ color:var(--warn); font-size:12.5px; margin:6px 0 14px; letter-spacing:.3px; }
  .m-actions{ display:flex; gap:10px; margin-top:18px; }
  .m-cancel{ flex:1; background:var(--surface2); color:var(--txt); border:1px solid var(--line); }
  .m-confirm{ flex:2; background:var(--accent); color:#04210f; font-weight:700; }

  /* ---- Adaptations petits téléphones ---- */
  @media (max-width:380px){
    body{ padding-left:max(12px,env(safe-area-inset-left)); padding-right:max(12px,env(safe-area-inset-right)); }
    h1{ letter-spacing:2px; margin-bottom:18px; }
    label{ margin-top:14px; }
    input[type=text],input[type=number]{ padding:12px; }
    .btn-scan{ padding:12px 12px; }
    .hrow{ gap:8px; padding:11px 12px; }
    .hrow .bf{ font-size:14px; }
    .qty{ padding:4px 8px; font-size:12px; }
  }
  @media (max-height:560px){
    canvas#sign{ height:110px; }
  }
</style>
</head>
<body>

<h1>Bon de sortie</h1>

<label>BF <span class="req">*</span></label>
<div class="row">
  <input type="text" id="bf" inputmode="text" autocomplete="off" placeholder="Scanner ou saisir">
  <button type="button" class="btn-scan" id="scanBtn">⊞ Scanner</button>
</div>
<div id="reader"></div>
<div id="rawScan"></div>

<label>Libellé</label>
<input type="text" id="libelle" autocomplete="off" placeholder="Rempli par le scan, ou à saisir">

<label>Quantité <span class="req">*</span></label>
<input type="number" id="quantite" inputmode="numeric" min="0" placeholder="0">

<label>ML <span class="req">*</span></label>
<input type="text" id="ml" inputmode="numeric" autocomplete="off" placeholder="8 chiffres (complété par des zéros)">

<label>Technicien <span class="req">*</span></label>
<input type="text" id="technicien" autocomplete="off">

<label>Date</label>
<div id="date"></div>

<div id="histo"></div>

<button type="button" class="btn-add" id="valider">+ Ajouter à la liste</button>

<div id="msg"></div>

<div id="overlay">
  <div id="modal">
    <div class="m-head">
      <span class="t">Signature</span>
      <button type="button" class="m-x" id="mClose">✕</button>
    </div>
    <div class="m-sub" id="mSub">Signe pour valider l'envoi des lignes</div>
    <canvas id="sign"></canvas>
    <div class="sign-row"><button type="button" class="btn-clear" id="clearSign">Effacer</button></div>
    <div class="m-actions">
      <button type="button" class="m-cancel" id="mCancel">Annuler</button>
      <button type="button" class="m-confirm" id="mConfirm">↑ Signer et envoyer</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ====================================================================
   CONFIG
   ==================================================================== */
const FLOW_URL = "https://defaultcae7d06108f340dd80c33c0b888922.4a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8de5db3a706c48b4aaae426a5dd86d2b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=UixePC7v2TgzRcoBCI2F0n_Jfxy_WEUokZPHeFbHZGY";
const SHARED_TOKEN = "ae9ea55b7439835b8d05d167738ec8160b1496ca4a77b408366c4c2e8060b2ca";
/* ==================================================================== */

const $ = id => document.getElementById(id);
const msg = $("msg");
function show(t,cls){ msg.textContent=t; msg.className=cls; }
// ML : uniquement des chiffres, complété à 8 par des zéros à gauche
function padML(v){ v=String(v).replace(/\D/g,''); return v ? v.padStart(8,'0') : ''; }

/* Un seul scan → BF + Libellé.
   Si le code contient un séparateur, on découpe : avant = BF, après = Libellé. */
const SEPARATORS = ["|",";","\t","~","^","#"];
function applyScan(raw){
  const rs=$("rawScan");
  rs.textContent = "Scan brut : " + raw;
  rs.style.display = "block";
  const sep = SEPARATORS.find(s => raw.includes(s));
  if(sep){
    const parts = raw.split(sep);
    $("bf").value = parts[0].trim();
    $("libelle").value = parts.slice(1).join(sep).trim();
  } else {
    $("bf").value = raw.trim();   // pas de séparateur : tout dans BF
  }
}

/* ---- Date affichée (auto) ---- */
function nowStr(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
$("date").textContent = nowStr();
setInterval(()=> $("date").textContent = nowStr(), 30000);

/* ---- Scanner code-barres (caméra) — générique BF et Libellé ---- */
let scanner=null, scanning=false, scanBtnCur=null;
async function stopScan(){
  if(scanner){ try{ await scanner.stop(); scanner.clear(); }catch(_){} }
  scanner=null; scanning=false;
  if(scanBtnCur) scanBtnCur.textContent="⊞ Scanner";
  scanBtnCur=null;
  $("reader").style.display="none";
}
async function toggleScan(inputId, readerId, btn){
  const wasThis = scanning && scanBtnCur===btn;
  if(scanning) await stopScan();
  if(wasThis) return;
  const reader=$(readerId);
  reader.style.display="block"; btn.textContent="✕ Fermer"; scanBtnCur=btn;
  scanner=new Html5Qrcode(readerId);
  try{
    await scanner.start({ facingMode:"environment" },
      { fps:10, qrbox:{ width:260, height:140 } },
      decoded => {
        if(inputId==="bf") applyScan(decoded); else $(inputId).value=decoded;
        navigator.vibrate && navigator.vibrate(80); stopScan();
      },
      ()=>{});
    scanning=true;
  }catch(e){
    show("Caméra inaccessible. Autorise-la, ou saisis à la main.","err");
    reader.style.display="none"; btn.textContent="⊞ Scanner"; scanBtnCur=null; scanner=null;
  }
}
$("scanBtn").addEventListener("click", ()=>toggleScan("bf","reader",$("scanBtn")));

/* ---- Pavé signature ---- */
const cv=$("sign"), ctx=cv.getContext("2d");
function fitCanvas(){
  const r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.scale(dpr,dpr);
  ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.strokeStyle="#e8eaf0";
}
fitCanvas(); window.addEventListener("resize", fitCanvas);
let drawing=false, hasSign=false;
function pos(e){ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
  return { x:t.clientX-r.left, y:t.clientY-r.top }; }
function start(e){ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
function move(e){ if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSign=true; e.preventDefault(); }
function end(){ drawing=false; }
cv.addEventListener("mousedown",start); cv.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
cv.addEventListener("touchstart",start,{passive:false}); cv.addEventListener("touchmove",move,{passive:false}); cv.addEventListener("touchend",end);
$("clearSign").addEventListener("click", ()=>{ ctx.clearRect(0,0,cv.width,cv.height); hasSign=false; });
$("ml").addEventListener("blur", ()=>{ if($("ml").value.trim()) $("ml").value=padML($("ml").value); });

/* ---- Liste locale (chaque ajout = une ligne, PAS de cumul de quantité) ---- */
const KEY="sorties_pending";
function getQ(){ try{ return JSON.parse(localStorage.getItem(KEY))||[] }catch{ return [] } }
function setQ(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
function removeAt(i){ const a=getQ(); a.splice(i,1); setQ(a); renderHisto(); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function addLine(d){ const a=getQ(); a.push(d); setQ(a); }

function renderHisto(){
  const a=getQ(), el=$("histo");
  if(!a.length){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="block";
  const rows = a.map((d,i)=>`<div class="hrow">
      <span class="bf">${esc(d.BF)}</span>
      <span class="meta">${esc(d.Libelle||'')} · ${esc(d.ML)} · ${esc(d.Technicien)}</span>
      <span class="qty">×${esc(d.Quantite)}</span>
      <button class="hdel" data-i="${i}" title="Supprimer">✕</button>
    </div>`).join("");
  el.innerHTML = `<div class="htitle">
      <span class="lbl">À envoyer · ${a.length} ligne(s)</span>
      <button class="btn-send" id="envoyerTout">↑ Envoyer (${a.length})</button>
    </div>${rows}`;
  $("envoyerTout").onclick = openSign;
  el.querySelectorAll(".hdel").forEach(b => b.onclick = () => removeAt(+b.dataset.i));
}

/* ---- Ajout (Valider) ---- */
$("valider").addEventListener("click", () => {
  const bf=$("bf").value.trim(), lib=$("libelle").value.trim(), q=$("quantite").value.trim(),
        ml=padML($("ml").value), tech=$("technicien").value.trim();
  if(!bf||!q||!ml||!tech){ show("Remplis BF, Quantité, ML et Technicien.","err"); return; }

  // La signature est apposée une seule fois, au moment de l'envoi
  addLine({
    Token:SHARED_TOKEN, Date:nowStr(), BF:bf, Libelle:lib, Technicien:tech, ML:ml,
    Quantite:q, Signature:""
  });
  show("Ligne ajoutée ✓","ok");
  $("bf").value=$("libelle").value=$("quantite").value=$("ml").value="";
  $("bf").focus();
  renderHisto();
});

/* ---- Envoi vers le flow ---- */
async function send(d){
  if(FLOW_URL.startsWith("COLLER")){ show("⚠ URL du flow non configurée.","err"); return false; }
  const payload = { Token:d.Token, Date:d.Date, BF:d.BF, Libelle:d.Libelle, Technicien:d.Technicien,
                    ML:d.ML, Quantite:d.Quantite, Signature:d.Signature };
  try{
    const r = await fetch(FLOW_URL, { method:"POST",
      headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
    return r.ok;
  }catch(_){ return false; }
}

async function flush(){
  let a=getQ(); if(!a.length) return;
  const btn=$("envoyerTout"); if(btn) btn.disabled=true;
  show("Envoi…","ok");
  let sent=0;
  for(let i=0;i<a.length;){ if(await send(a[i])){ a.splice(i,1); setQ(a); sent++; } else break; }
  renderHisto();
  if(!getQ().length) show(`Envoyé ✓ (${sent} ligne(s))`,"ok");
  else show(`${sent} envoyée(s), ${getQ().length} restante(s). Réessaie « Envoyer ».`,"err");
}
/* ---- Modale de signature, au moment de l'envoi ---- */
const overlay=$("overlay");
function openSign(){
  if(!getQ().length) return;
  overlay.style.display="flex";
  $("mSub").textContent = "Signe pour valider l'envoi des lignes";
  $("mSub").style.color = "var(--warn)";
  // le canvas doit être mesuré une fois la modale visible
  requestAnimationFrame(()=>{ fitCanvas(); hasSign=false; });
}
function closeSign(){ overlay.style.display="none"; }
$("mClose").onclick = closeSign;
$("mCancel").onclick = closeSign;
overlay.addEventListener("click", e => { if(e.target===overlay) closeSign(); });

$("mConfirm").onclick = () => {
  if(!hasSign){
    $("mSub").textContent = "Signature requise — signe dans le cadre.";
    $("mSub").style.color = "var(--danger)";
    return;
  }
  const sig = cv.toDataURL("image/png");
  const a = getQ(); a.forEach(d => d.Signature = sig); setQ(a);
  closeSign();
  flush();
};

window.addEventListener("online", () => { if(getQ().length) flush(); });
renderHisto();
</script>
</body>
</html>
