<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bon de sortie</title>
<style>
  :root { --vert:#2e7d32; --bord:#9aa0a6; --bg:#fff; --txt:#1a1a1a; --gris:#f1f3f4; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
         color:var(--txt); background:var(--bg); padding:14px; max-width:520px; margin:auto; }
  h1 { font-size:18px; letter-spacing:1px; text-align:center; margin:6px 0 16px; }
  label { display:block; font-size:14px; margin:14px 0 4px; font-weight:600; }
  label .req { color:#c62828; }
  input[type=text], input[type=number] {
    width:100%; padding:11px; font-size:16px; border:1px solid var(--bord);
    border-radius:6px; background:var(--bg); }
  .row { display:flex; gap:8px; }
  .row input { flex:1; }
  button { font-size:15px; border:none; border-radius:6px; padding:11px 14px; cursor:pointer; }
  .btn-scan { background:#1565c0; color:#fff; white-space:nowrap; }
  .btn-clear { background:var(--gris); color:#333; }
  .btn-valider { background:var(--vert); color:#fff; width:100%; font-size:17px;
                 font-weight:700; padding:15px; margin-top:18px; letter-spacing:.5px; }
  .btn-valider:disabled { background:#9e9e9e; }
  #reader { width:100%; margin-top:8px; border-radius:8px; overflow:hidden; display:none; }
  #date { color:#555; font-size:14px; margin-top:4px; }
  canvas#sign { width:100%; height:150px; border:1px solid var(--bord);
                border-radius:6px; touch-action:none; background:#fafafa; }
  .sign-row { display:flex; justify-content:flex-end; margin-top:6px; }
  #msg { margin-top:12px; padding:10px; border-radius:6px; font-size:14px; display:none; }
  #msg.ok { background:#e8f5e9; color:#1b5e20; display:block; }
  #msg.err{ background:#ffebee; color:#b71c1c; display:block; }
  #histo { margin-top:18px; display:none; }
  .htitle { display:flex; justify-content:space-between; align-items:center;
            font-size:14px; font-weight:700; color:#b26a00; margin-bottom:8px; }
  .htitle button { background:#1565c0; color:#fff; padding:8px 12px; font-size:13px; }
  .htitle button:disabled { background:#9e9e9e; }
  .hrow { display:flex; gap:8px; align-items:center; font-size:13px;
          padding:8px; border:1px solid #e6e6e6; border-radius:6px; margin-bottom:6px; background:#fafafa; }
  .hrow .bf { font-weight:700; }
  .hrow .grow { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#555; }
  .hdel { margin-left:auto; background:#ffebee; color:#b71c1c; padding:5px 9px; font-size:13px; }
</style>
</head>
<body>

<h1>BON DE SORTIE</h1>

<label>BF <span class="req">*</span></label>
<div class="row">
  <input type="text" id="bf" inputmode="text" autocomplete="off" placeholder="Scanner ou saisir">
  <button type="button" class="btn-scan" id="scanBtn">📷 Scanner</button>
</div>
<div id="reader"></div>

<label>Quantité <span class="req">*</span></label>
<input type="number" id="quantite" inputmode="numeric" min="0" placeholder="0">

<label>ML <span class="req">*</span></label>
<input type="text" id="ml" autocomplete="off">

<label>Technicien <span class="req">*</span></label>
<input type="text" id="technicien" autocomplete="off">

<label>Date</label>
<div id="date"></div>

<label>Signature</label>
<canvas id="sign"></canvas>
<div class="sign-row"><button type="button" class="btn-clear" id="clearSign">Effacer</button></div>

<div id="histo"></div>

<button type="button" class="btn-valider" id="valider">✔ AJOUTER À LA LISTE</button>

<div id="msg"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ====================================================================
   CONFIG — colle ici l'URL du déclencheur HTTP de ton flow Power Automate
   ==================================================================== */
const FLOW_URL = "https://defaultcae7d06108f340dd80c33c0b888922.4a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8b800467ce2e4947bd6b32b48f302009/triggers/manual/paths/invoke?api-version=1";
// Jeton partagé : doit être IDENTIQUE à celui contrôlé dans le flow.
// Génère une valeur longue et aléatoire (ex. un GUID) et remplace ci-dessous.
const SHARED_TOKEN = "ae9ea55b7439835b8d05d167738ec8160b1496ca4a77b408366c4c2e8060b2ca";
/* ==================================================================== */

const $ = id => document.getElementById(id);
const msg = $("msg");

/* ---- Date affichée (auto) ---- */
function nowStr(){
  const d = new Date(), p = n => String(n).padStart(2,"0");
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
$("date").textContent = nowStr();
setInterval(()=> $("date").textContent = nowStr(), 30000);

/* ---- Scanner code-barres (caméra) ---- */
let scanner = null, scanning = false;
$("scanBtn").addEventListener("click", async () => {
  const reader = $("reader");
  if (scanning){ await stopScan(); return; }
  reader.style.display = "block";
  $("scanBtn").textContent = "✖ Fermer";
  scanner = new Html5Qrcode("reader");
  try {
    await scanner.start({ facingMode:"environment" },
      { fps:10, qrbox:{ width:260, height:140 } },
      decoded => { $("bf").value = decoded; navigator.vibrate && navigator.vibrate(80); stopScan(); },
      () => {});
    scanning = true;
  } catch(e){
    show("Caméra inaccessible. Vérifie l'autorisation, ou saisis le BF à la main. ("+e+")","err");
    reader.style.display="none"; $("scanBtn").textContent="📷 Scanner";
  }
});
async function stopScan(){
  if (scanner){ try{ await scanner.stop(); scanner.clear(); }catch(_){} }
  scanning = false; $("reader").style.display="none"; $("scanBtn").textContent="📷 Scanner";
}

/* ---- Pavé signature ---- */
const cv = $("sign"), ctx = cv.getContext("2d");
function fitCanvas(){
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio||1;
  cv.width = r.width*dpr; cv.height = r.height*dpr; ctx.scale(dpr,dpr);
  ctx.lineWidth = 2.2; ctx.lineCap="round"; ctx.strokeStyle="#111";
}
fitCanvas(); window.addEventListener("resize", fitCanvas);
let drawing=false, hasSign=false;
function pos(e){ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
  return { x:t.clientX-r.left, y:t.clientY-r.top }; }
function start(e){ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
function move(e){ if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSign=true; e.preventDefault(); }
function end(){ drawing=false; }
cv.addEventListener("mousedown",start); cv.addEventListener("mousemove",move);
window.addEventListener("mouseup",end);
cv.addEventListener("touchstart",start,{passive:false});
cv.addEventListener("touchmove",move,{passive:false});
cv.addEventListener("touchend",end);
$("clearSign").addEventListener("click", ()=>{ ctx.clearRect(0,0,cv.width,cv.height); hasSign=false; });

/* ---- Validation + envoi ---- */
function show(t,cls){ msg.textContent=t; msg.className=cls; }

$("valider").addEventListener("click", async () => {
  const bf=$("bf").value.trim(), q=$("quantite").value.trim(),
        ml=$("ml").value.trim(), tech=$("technicien").value.trim();
  if(!bf||!q||!ml||!tech){ show("Remplis tous les champs obligatoires (*).","err"); return; }

  const data = {
    Token: SHARED_TOKEN,
    Date: nowStr(),
    BF: bf,
    Technicien: tech,
    ML: ml,
    Quantite: q,
    Signature: hasSign ? cv.toDataURL("image/png") : ""
  };

  // Stockage local : la ligne entre dans la liste, l'envoi se fait ensuite
  queue(data);
  show("Ligne ajoutée à la liste ✅","ok");
  $("bf").value=$("quantite").value=$("ml").value="";
  ctx.clearRect(0,0,cv.width,cv.height); hasSign=false;
  $("bf").focus();
  renderHisto();
});

async function send(data){
  if(FLOW_URL.startsWith("COLLER")){ show("⚠ URL du flow non configurée dans le HTML.","err"); return false; }
  try{
    // text/plain = pas de pré-vol CORS ; le flow parse le JSON
    const r = await fetch(FLOW_URL, { method:"POST",
      headers:{ "Content-Type":"text/plain" }, body: JSON.stringify(data) });
    return r.ok;
  }catch(_){ return false; }
}

/* ---- Liste locale des lignes stockées avant envoi (localStorage) ---- */
const KEY="sorties_pending";
function getQ(){ try{ return JSON.parse(localStorage.getItem(KEY))||[] }catch{ return [] } }
function setQ(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
function queue(d){ const a=getQ(); a.push(d); setQ(a); }
function removeAt(i){ const a=getQ(); a.splice(i,1); setQ(a); renderHisto(); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderHisto(){
  const a=getQ(), el=$("histo");
  if(!a.length){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="block";
  const rows = a.map((d,i)=>`<div class="hrow">
      <span class="bf">${esc(d.BF)}</span>
      <span>×${esc(d.Quantite)}</span>
      <span class="grow">${esc(d.ML)} · ${esc(d.Technicien)}${d.Signature?' · 🖊':''}</span>
      <button class="hdel" data-i="${i}">✕</button>
    </div>`).join("");
  el.innerHTML = `<div class="htitle">📋 ${a.length} ligne(s) en attente
      <button id="envoyerTout">📤 Envoyer (${a.length})</button></div>${rows}`;
  $("envoyerTout").onclick = flush;
  el.querySelectorAll(".hdel").forEach(b => b.onclick = () => removeAt(+b.dataset.i));
}

async function flush(){
  let a=getQ();
  if(!a.length) return;
  const btn=$("envoyerTout"); if(btn){ btn.disabled=true; }
  show("Envoi…","ok");
  let sent=0;
  for(let i=0;i<a.length;){ if(await send(a[i])){ a.splice(i,1); setQ(a); sent++; } else break; }
  renderHisto();
  if(!getQ().length) show(`Envoyé ✅ (${sent} ligne(s))`,"ok");
  else show(`${sent} envoyée(s), ${getQ().length} restante(s). Réessaie « Envoyer ».`,"err");
}
window.addEventListener("online", () => { if(getQ().length) flush(); });
renderHisto();
</script>
</body>
</html>
